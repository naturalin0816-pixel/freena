<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 룰렛 - 에너지 코어 에디션</title>
    <!-- Tailwind CSS 및 폭죽 효과 라이브러리 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #020617; 
            color: white; 
            overflow-x: hidden; 
        }

        /* 룰렛 컨테이너 및 캔버스 스타일 */
        .roulette-container { 
            position: relative; 
            width: 100%; 
            max-width: 500px; 
            aspect-ratio: 1/1; 
            margin: 0 auto; 
        }
        
        canvas { 
            width: 100%; 
            height: 100%; 
            filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.3)); 
        }

        /* 룰렛 포인터 (상단 화살표) */
        .pointer {
            position: absolute; 
            top: -10px; 
            left: 50%; 
            transform: translateX(-50%);
            width: 40px; 
            height: 50px; 
            z-index: 20;
            background: #ef4444; 
            clip-path: polygon(100% 0, 0 0, 50% 100%);
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }

        /* 중앙 코어 버튼 */
        .core-button {
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            width: 100px; 
            height: 100px; 
            border-radius: 50%;
            background: radial-gradient(circle, #6366f1 0%, #4338ca 100%);
            border: 4px solid #1e1b4b; 
            cursor: pointer;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.6); 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 30; 
            user-select: none;
            touch-action: none;
        }

        /* 버튼 충전 중 애니메이션 */
        .core-button.charging { 
            background: radial-gradient(circle, #f43f5e 0%, #be123c 100%);
            box-shadow: 0 0 60px rgba(244, 63, 94, 0.9);
            animation: pulse 0.4s infinite alternate;
        }

        @keyframes pulse { 
            from { transform: translate(-50%, -50%) scale(1); } 
            to { transform: translate(-50%, -50%) scale(1.15); } 
        }

        /* 화면 진동 효과 */
        .shaking { animation: shake 0.1s infinite; }
        @keyframes shake { 
            0% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-2px, 0px) rotate(-0.5deg); }
            50% { transform: translate(2px, 1px) rotate(0.5deg); }
            75% { transform: translate(-1px, -1px) rotate(0deg); }
            100% { transform: translate(1px, 2px) rotate(-0.5deg); }
        }

        /* 커스텀 스크롤바 숨기기 */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .tab-active { border-bottom: 3px solid #6366f1; color: #818cf8; font-weight: 900; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- 상단 가로 탭 세트 관리 -->
    <header class="sticky top-0 z-40 bg-slate-900/90 backdrop-blur-md border-b border-slate-800">
        <div class="flex items-center px-4 overflow-x-auto hide-scroll whitespace-nowrap py-4 space-x-6" id="tabContainer">
            <!-- 탭이 JS에 의해 동적으로 생성됩니다 -->
        </div>
    </header>

    <main class="flex-1 p-6 flex flex-col items-center justify-start space-y-8 max-w-4xl mx-auto w-full">
        
        <!-- 현재 세트 제목 편집 -->
        <div class="w-full text-center mt-4">
            <input type="text" id="setTitle" 
                   class="bg-transparent text-3xl md:text-5xl font-black text-center border-none focus:ring-0 w-full text-indigo-100" 
                   placeholder="세트 제목을 입력하세요">
        </div>

        <!-- 룰렛 보드 섹션 -->
        <div class="roulette-container" id="wheelWrapper">
            <div class="pointer"></div>
            <canvas id="rouletteCanvas"></canvas>
            
            <!-- 중앙 인터랙티브 버튼 -->
            <div id="coreBtn" class="core-button">
                <span class="text-[11px] font-bold text-indigo-200 tracking-tighter">HOLD &</span>
                <span class="text-xl font-black text-white leading-none">SPIN</span>
                <div id="powerBar" class="w-14 h-1.5 bg-white/20 mt-2 rounded-full overflow-hidden">
                    <div id="powerFill" class="h-full bg-white w-0 transition-all duration-75"></div>
                </div>
            </div>
        </div>

        <!-- 이름 리스트 관리 UI -->
        <div class="w-full max-w-lg bg-slate-900/60 rounded-3xl p-6 border border-slate-800 shadow-2xl">
            <div class="flex justify-between items-center mb-5">
                <h3 class="font-bold text-slate-400 text-lg">명단 리스트</h3>
                <span class="bg-indigo-500/20 text-indigo-400 text-xs px-3 py-1 rounded-full font-bold" id="itemCount">0명</span>
            </div>
            
            <div class="flex gap-3 mb-6">
                <input type="text" id="newName" placeholder="새 이름 추가..." 
                       class="flex-1 bg-slate-800/80 border-slate-700 rounded-xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-white placeholder-slate-500 transition-all">
                <button onclick="addItem()" class="bg-indigo-600 hover:bg-indigo-500 px-6 py-3 rounded-xl font-bold transition shadow-lg active:scale-95">추가</button>
            </div>

            <div id="nameList" class="flex flex-wrap gap-2 max-h-60 overflow-y-auto pr-2 hide-scroll">
                <!-- 이름 태그들이 여기에 생성됩니다 -->
            </div>
        </div>

        <div class="flex flex-col items-center gap-4 py-4">
            <button onclick="addNewSet()" class="bg-slate-800 hover:bg-slate-700 text-indigo-300 px-6 py-2 rounded-full text-sm font-bold border border-indigo-500/20 transition-all hover:scale-105">
                + 새 세트 만들기 (최대 10개)
            </button>
            <p class="text-slate-600 text-xs">중앙 버튼을 꾹 누를수록 더 빠르게 회전합니다!</p>
        </div>
    </main>

    <!-- 결과 당첨 팝업 모달 -->
    <div id="resultOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/95 hidden backdrop-blur-2xl">
        <div class="text-center p-10 animate-in fade-in zoom-in duration-300">
            <p class="text-rose-500 font-black mb-6 tracking-[0.3em] text-xl uppercase">Winner Selected!</p>
            <div class="relative inline-block">
                <h2 id="resultName" class="text-8xl md:text-[12rem] font-black text-white mb-12 drop-shadow-[0_0_50px_rgba(99,102,241,0.8)]"></h2>
            </div>
            <br>
            <button onclick="closeResult()" 
                    class="bg-indigo-600 hover:bg-indigo-500 text-white px-16 py-5 rounded-2xl font-black text-2xl transition-all hover:scale-110 active:scale-90 shadow-[0_0_30px_rgba(79,70,229,0.4)]">
                확인
            </button>
        </div>
    </div>

    <script>
        /** 오디오 엔진 (Web Audio API) **/
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playOsc(freq, type, vol, duration, ramp = true) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            if(ramp) gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const playTick = () => playOsc(600, 'sine', 0.1, 0.04);
        const playTension = () => playOsc(55, 'sine', 0.4, 0.25);

        let chargeOsc = null;
        function startChargeSound() {
            if (chargeOsc) return;
            chargeOsc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            chargeOsc.type = 'triangle';
            chargeOsc.frequency.setValueAtTime(120, audioCtx.currentTime);
            chargeOsc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 3);
            gain.gain.setValueAtTime(0.01, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 1.5);
            chargeOsc.connect(gain);
            gain.connect(audioCtx.destination);
            chargeOsc.start();
            chargeOsc.onended = () => { gain.disconnect(); };
            chargeOsc.gainNode = gain;
        }
        function stopChargeSound() {
            if (chargeOsc) {
                chargeOsc.gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                chargeOsc.stop(audioCtx.currentTime + 0.1);
                chargeOsc = null;
            }
        }

        const playWinSound = () => {
            [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
                setTimeout(() => playOsc(f, 'square', 0.05, 0.6), i * 120);
            });
        };

        /** 데이터 관리 및 로직 **/
        const STORAGE_KEY = 'roulette_pro_v3_sets';
        let sets = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [
            { id: Date.now(), title: "🎉 점심 메뉴 뽑기", members: ["치킨", "피자", "마라탕", "돈가스", "샌드위치", "초밥"] }
        ];
        let currentSetIndex = 0;

        const canvas = document.getElementById('rouletteCanvas');
        const ctx = canvas.getContext('2d');
        const coreBtn = document.getElementById('coreBtn');
        const powerFill = document.getElementById('powerFill');
        const wheelWrapper = document.getElementById('wheelWrapper');

        let isSpinning = false;
        let rotation = 0; // 라디안 단위
        let speed = 0;
        let power = 0;
        let chargeInterval = null;
        let lastTickAngle = 0;
        let tensionPlayed = false;

        function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(sets));
            renderTabs();
            draw();
        }

        function renderTabs() {
            const container = document.getElementById('tabContainer');
            container.innerHTML = '';
            sets.forEach((set, idx) => {
                const tab = document.createElement('div');
                tab.className = `flex items-center space-x-3 px-4 py-2 rounded-xl cursor-pointer transition-all duration-300 ${idx === currentSetIndex ? 'bg-indigo-600/20 tab-active' : 'text-slate-500 hover:bg-slate-800'}`;
                tab.innerHTML = `
                    <span class="text-sm font-bold" onclick="selectSet(${idx})">${set.title}</span>
                    ${sets.length > 1 ? `<button onclick="deleteSet(${idx})" class="hover:text-red-500 text-lg font-black px-1">×</button>` : ''}
                `;
                container.appendChild(tab);
            });
        }

        function selectSet(idx) {
            if(isSpinning) return;
            currentSetIndex = idx;
            document.getElementById('setTitle').value = sets[idx].title;
            renderNames();
            renderTabs();
            draw();
        }

        function addNewSet() {
            if(sets.length >= 10) return;
            const newSet = { id: Date.now(), title: `새 세트 ${sets.length + 1}`, members: ["항목 1", "항목 2"] };
            sets.push(newSet);
            currentSetIndex = sets.length - 1;
            save();
            selectSet(currentSetIndex);
        }

        function deleteSet(idx) {
            if(sets.length <= 1) return;
            sets.splice(idx, 1);
            currentSetIndex = 0;
            save();
            selectSet(0);
        }

        function renderNames() {
            const container = document.getElementById('nameList');
            container.innerHTML = '';
            const members = sets[currentSetIndex].members;
            members.forEach((name, i) => {
                const div = document.createElement('div');
                div.className = "bg-slate-800 text-slate-200 px-4 py-2 rounded-xl flex items-center gap-2 border border-slate-700 transition hover:border-indigo-500";
                div.innerHTML = `
                    <span contenteditable="true" class="focus:outline-none" onblur="updateItem(${i}, this.innerText)">${name}</span>
                    <button onclick="removeItem(${i})" class="text-slate-500 hover:text-rose-500 font-bold ml-1">×</button>
                `;
                container.appendChild(div);
            });
            document.getElementById('itemCount').innerText = `${members.length}명`;
            draw();
        }

        function addItem() {
            const input = document.getElementById('newName');
            const val = input.value.trim();
            if(!val) return;
            sets[currentSetIndex].members.push(val);
            input.value = '';
            save();
            renderNames();
        }

        function updateItem(idx, text) {
            sets[currentSetIndex].members[idx] = text.trim() || "이름 없음";
            save();
        }

        function removeItem(idx) {
            sets[currentSetIndex].members.splice(idx, 1);
            save();
            renderNames();
        }

        document.getElementById('setTitle').oninput = (e) => {
            sets[currentSetIndex].title = e.target.value;
            save();
        };

        /** 룰렛 그리기 로직 **/
        function draw() {
            const members = sets[currentSetIndex].members;
            const size = canvas.width = canvas.height = 800; 
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size / 2 - 20;
            const sliceAngle = (Math.PI * 2) / members.length;

            ctx.clearRect(0, 0, size, size);

            members.forEach((name, i) => {
                const startAngle = rotation + (i * sliceAngle);
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle);
                ctx.fillStyle = `hsl(${i * (360 / members.length)}, 70%, 45%)`;
                ctx.fill();
                ctx.strokeStyle = '#020617';
                ctx.lineWidth = 6;
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 34px Pretendard";
                ctx.shadowColor = "rgba(0,0,0,0.5)";
                ctx.shadowBlur = 10;
                ctx.fillText(name, radius - 60, 12);
                ctx.restore();
            });

            ctx.beginPath();
            ctx.arc(centerX, centerY, 90, 0, Math.PI * 2);
            ctx.fillStyle = '#020617';
            ctx.fill();
        }

        /** 스핀 인터랙션 **/
        function startCharge() {
            if (isSpinning || sets[currentSetIndex].members.length < 2) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            power = 0;
            coreBtn.classList.add('charging');
            startChargeSound();
            
            chargeInterval = setInterval(() => {
                power = Math.min(power + 1.8, 100);
                powerFill.style.width = power + '%';
            }, 30);
        }

        function releaseCharge() {
            if (!chargeInterval) return;
            clearInterval(chargeInterval);
            chargeInterval = null;
            stopChargeSound();
            coreBtn.classList.remove('charging');
            
            if (power > 5) {
                beginSpin();
            } else {
                power = 0;
                powerFill.style.width = '0%';
            }
        }

        function beginSpin() {
            isSpinning = true;
            speed = 0.2 + (power / 120); 
            power = 0;
            powerFill.style.width = '0%';
            tensionPlayed = false;
            animate();
        }

        function animate() {
            if (!isSpinning) return;

            rotation += speed;
            speed *= 0.988; 

            const sliceAngle = (Math.PI * 2) / sets[currentSetIndex].members.length;
            if (Math.abs(rotation - lastTickAngle) >= sliceAngle) {
                playTick();
                lastTickAngle = rotation;
            }

            if (speed < 0.04 && speed > 0.01 && !tensionPlayed) {
                playTension();
                tensionPlayed = true;
                setTimeout(() => tensionPlayed = false, 500);
            }

            if (speed > 0.1) {
                wheelWrapper.classList.add('shaking');
            } else {
                wheelWrapper.classList.remove('shaking');
            }

            draw();

            if (speed < 0.001) {
                isSpinning = false;
                speed = 0;
                wheelWrapper.classList.remove('shaking');
                showWinner();
            } else {
                requestAnimationFrame(animate);
            }
        }

        /** 당첨자 확인 (버그 수정됨) **/
        function showWinner() {
            const members = sets[currentSetIndex].members;
            
            // 캔버스 arc 0도는 3시 방향. 포인터는 12시 방향(270도 혹은 -90도).
            // 현재 회전각(rotation)을 도 단위로 변환
            const rotationDeg = (rotation * 180 / Math.PI) % 360;
            
            // 포인터 위치(270도)에서 현재 회전각을 뺀 뒤, 전체 조각 수로 나눔
            const sliceDeg = 360 / members.length;
            
            // (포인터각도 - 현재회전각도)를 계산하여 0~360 사이로 정규화
            const winningAngle = (270 - rotationDeg + 360) % 360;
            const index = Math.floor(winningAngle / sliceDeg) % members.length;
            
            const winner = members[index];
            document.getElementById('resultName').innerText = winner;
            document.getElementById('resultOverlay').classList.remove('hidden');
            
            playWinSound();
            confetti({
                particleCount: 200,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#6366f1', '#f43f5e', '#ffffff', '#fbbf24']
            });
        }

        function closeResult() {
            document.getElementById('resultOverlay').classList.add('hidden');
        }

        coreBtn.addEventListener('mousedown', startCharge);
        window.addEventListener('mouseup', releaseCharge);
        coreBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startCharge(); });
        window.addEventListener('touchend', (e) => { e.preventDefault(); releaseCharge(); });
        document.getElementById('newName').onkeypress = (e) => { if(e.key === 'Enter') addItem(); };

        selectSet(0);
    </script>
</body>
</html>
